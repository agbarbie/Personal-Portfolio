<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — To-Do App</title>
  <link rel="stylesheet" href="style.css" />
  <script src="script.js" defer></script>
</head>
<body>

  <div class="app-header">
    <h1>Task<span>Flow</span></h1>
    <p>Stay organized, stay focused.</p>
  </div>

  <div class="app-container">

    <div class="stats">
      <div class="stat-box">
        <div class="stat-num" id="total-count">0</div>
        <div class="stat-label">Total</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="active-count">0</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-box">
        <div class="stat-num" id="done-count">0</div>
        <div class="stat-label">Done</div>
      </div>
    </div>

    <div class="input-area">
      <input
        class="task-input"
        id="task-input"
        type="text"
        placeholder="Add a new task..."
        maxlength="100"
      />
      <button class="add-btn" onclick="addTask()">+ Add</button>
    </div>

    <div class="filters">
      <button
        class="filter-btn active"
        onclick="setFilter('all', this)">
        All
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('active', this)">
        Active
      </button>
      <button
        class="filter-btn"
        onclick="setFilter('completed', this)">
        Completed
      </button>
    </div>

    <div class="task-list" id="task-list"></div>

    <div class="bottom-bar">
      <span id="remaining-text">No tasks yet</span>
      <button class="clear-btn" onclick="clearCompleted()">
        Clear completed
      </button>
    </div>

  </div>

</body>
</html>
